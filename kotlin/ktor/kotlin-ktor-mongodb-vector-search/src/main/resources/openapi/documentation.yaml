openapi: 3.0.0
info:
  title: Fitness API
  version: 1.0.0
  description: |
    This Swagger documentation file outlines the API specifications for a Fitness Tracker application built with Ktor and MongoDB. The API allows users to manage fitness records, including retrieving all records, creating new records, updating and deleting records by ID, and retrieving records by exercise type. The API uses the Fitness and FitnessDetails data classes to structure the fitness-related information.
   
    - [The Fitness Tracker GitHub repository](https://github.com/ricardohsmello/fitness-tracker)
paths:
  /fitness:
    get:
      summary: Retrieve all fitness records
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: []
    post:
      summary: Create a new fitness record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FitnessRequest'
      responses:
        '201':
          description: Fitness created successfully
        '400':
          description: Bad request
  /fitness/{id}:
    get:
      summary: Retrieve fitness record by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {}
        '404':
          description: Fitness not found
    delete:
      summary: Delete fitness record by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Fitness deleted successfully
        '400':
          description: Bad request
        '404':
          description: Fitness not found
    patch:
      summary: Update fitness record by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FitnessRequest'
      responses:
        '200':
          description: Fitness updated successfully
        '400':
          description: Bad request
        '404':
          description: Fitness not found
  /fitness/exerciseType/{type}:
    get:
      summary: Retrieve fitness records by exercise type
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: []
        '400':
          description: Bad request
  /exercises/seed:
    post:
      summary: Seed the exercises collection from exercises.json
      description: |
        Loads the bundled `exercises.json`, generates the `descEmbedding` vector for each
        exercise via the Hugging Face Inference API, and inserts the documents into the
        `exercises` collection. Required before using Vector Search.
      responses:
        '201':
          description: Exercises seeded successfully
          content:
            text/plain:
              example: Seeded 50 exercises
        '502':
          description: Failed to generate an embedding via Hugging Face
        '500':
          description: exercises.json not found on the classpath
  /exercises/processRequest:
    post:
      summary: Find exercises similar to a phrase (Vector Search)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SentenceRequest'
      responses:
        '202':
          description: Similar exercises found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExercisesResponse'
components:
  schemas:
    Fitness:
      type: object
      properties:
        id:
          type: string
          format: uuid
        exerciseType:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        notes:
          type: string
        details:
          $ref: '#/components/schemas/FitnessDetails'
      required:
        - id
        - exerciseType
        - startTime
        - endTime
        - notes
        - details

    FitnessDetails:
      type: object
      properties:
        durationMinutes:
          type: integer
          format: int32
        distance:
          type: number
          format: double
        caloriesBurned:
          type: integer
          format: int32
      required:
        - durationMinutes
        - distance
        - caloriesBurned

    FitnessRequest:
      type: object
      properties:
        exerciseType:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        notes:
          type: string
        details:
          $ref: '#/components/schemas/FitnessDetails'
      required:
        - exerciseType
        - startTime
        - endTime
        - notes
        - details

    SentenceRequest:
      type: object
      properties:
        input:
          type: string
          example: exercises to strengthen the abs
      required:
        - input

    ExercisesResponse:
      type: object
      properties:
        exerciseNumber:
          type: integer
          format: int32
        title:
          type: string
        description:
          type: string
        bodyPart:
          type: string
        type:
          type: string
